services:
  postgres:
    image: postgres:16-alpine
    container_name: sitotabot-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sitotabot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build: .
    container_name: sitotabot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sitotabot}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEBHOOK_URL: https://${DOMAIN}
      WEBHOOK_PORT: 8443
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      RANDOM_ORG_API_KEY: ${RANDOM_ORG_API_KEY:-}
      MINI_APP_URL: https://${DOMAIN}
    expose:
      - "8443"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: sitotabot-caddy
    depends_on:
      - bot
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
