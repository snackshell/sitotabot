services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: sitotabot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sitotabot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Telegram Bot ──
  bot:
    build: .
    container_name: sitotabot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sitotabot
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8443}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      RANDOM_ORG_API_KEY: ${RANDOM_ORG_API_KEY:-}
    ports:
      - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT:-8443}"
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
